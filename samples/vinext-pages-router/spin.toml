spin_manifest_version = 2

[application]
authors = ["Karthik Ganeshram <kganeshr@akamai.com>"]
description = ""
name = "vinext-pages-router"
version = "0.1.0"

[[trigger.http]]
route = "/..."
component = "vinext-pages-router"

[component.vinext-pages-router]
source = "dist/vinext-pages-router.wasm"
exclude_files = ["**/node_modules"]
allowed_outbound_hosts = [
    # "tcp://127.0.0.1:*", # Uncomment this line to while using the StarlingMonkey Debugger
]
[component.vinext-pages-router.build]
command = ["npm install", "npm run build"]
watch = ["src/**/*.ts"]

# Static file server for client-side assets (JS, CSS, etc.)
[[trigger.http]]
route = "/assets/..."
component = "client-assets"

[component.client-assets]
source = { url = "https://github.com/fermyon/spin-fileserver/releases/download/v0.3.0/spin_static_fs.wasm", digest = "sha256:ef88708817e107bf49985c7cefe4dd1f199bf26f6727819183d5c996baa3d148" }
files = [{ source = "dist/client/assets", destination = "/" }]